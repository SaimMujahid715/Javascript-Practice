<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: burlywood;
        }
        h1{
            text-align: center;
            color: red;
            font-size: 3rem;
            font-weight: 800;

        }
        p{
            padding: 15px;
            color:darkolivegreen;
            font-size: 1.5rem;
            font-weight: 700;
        }
        button{
            padding: 10px;
            width: 150px;
            border-radius:10px ;
            color: black;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Printing Odd Numbers From 1 To 50!!</h1>
     <p id="result"></p>
    <button onclick="
    let result = document.getElementById('result');
    let series = '' ;
        for(i = 1 ; i <= 50 ; i+=2){
            series += i + '<br> ' ;
            }
         result.innerHTML=series">Print series</button>
  
       


    <script>
        

    </script>
</body>
</html>
