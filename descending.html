<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descending</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: burlywood;
        }
        h1{
            text-align: center;
            color: red;
            font-size: 3rem;
            font-weight: 800;

        }
        p{
            text-align: center;
            color:darkolivegreen;
            font-size: 2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Printing Numbers in descending order using JavaScript.</h1>

    <script>
        // For Descending Order

        console.log("Descending Order")

        for(let i = 10; i >= 1; i --){
            console.log(i)
        }
    </script>

    <!-- FOR ASCENDING ORDER -->

    <script>
        console.log("Ascending Order")
        for(let j = 1; j <= 10; j ++){
            console.log(j)
        }
    </script>
</body>
</html>
