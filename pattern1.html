    <script>
        console.log( "\n" , "Pattern 1")
        let Output = document.querySelector("#Output")
        let result = ""
        for(let i = 0; i <= 2; i++){     //row ko define krta he
            for(let a = 0; a <= 4; a++){ //column ko define krta he
            result += "*" 
            console.log("*")  
            }

    </script>

    <script>

        console.log( "\n" , "Pattern 2")
        for(let i = 1; i <= 4; i++){
            let rows = ""
            for(let j = 1; j<= i; j++){
                rows +=  "*"
            }

        }
    </script>

    <script>

        console.log( "\n" , "Pattern 3")
        for(let i = 1; i <= 4; i++){
            let cols = ""
            for(let j = 4; j >= i; j--){
                cols += "*"
            }
            console.log(cols)
        }
    </script>
