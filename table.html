<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: burlywood;
        }
        h1{
            text-align: center;
            color: red;
            font-size: 3rem;
            font-weight: 800;

        }
        p{
            text-align: center;
            color:darkolivegreen;
            font-size: 2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Writing Table using JavaScript.</h1>
    <input type="number" id="num"><br><br>
    <button onclick="
        let result = document.getElementById('result');
        let num = parseInt(document.getElementById('num').value);
        let table = '';
        for (let i = 1; i <= 10; i ++) {
            table += num + '*' + i + '=' + num * i + '<br>';
        }
        result.innerHTML = table">Print table</button>
    
<p id="result"></p>
</body>
</html>
